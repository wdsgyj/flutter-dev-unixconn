name: unixconn
description: "A Flutter FFI plugin that starts a Go unix proxy and connects HttpClient through unix sockets."
version: 1.0.0
homepage: "https://pub.codeffect.top"
publish_to: "https://pub.codeffect.top"

environment:
  sdk: ^3.5.4
  flutter: '>=3.3.0'

dependencies:
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  unixsock_plugin:
    hosted:
      url: https://pub.codeffect.top
    version: 1.0.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
